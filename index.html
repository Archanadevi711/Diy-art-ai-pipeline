<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♻️ DIY AI - Material Reuse Ideas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .upload-area {
            border: 3px dashed #4CAF50;
            border-radius: 15px;
            padding: 60px 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f9f9f9;
        }

        .upload-area:hover {
            border-color: #45a049;
            background: #f0f0f0;
        }

        .upload-area.dragover {
            border-color: #2196F3;
            background: #e3f2fd;
        }

        .upload-icon {
            font-size: 4em;
            color: #4CAF50;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 20px;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .results-section {
            display: none;
            margin-top: 40px;
        }

        .image-preview {
            text-align: center;
            margin-bottom: 30px;
        }

        .preview-img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .material-result {
            background: #e8f5e8;
            border-left: 5px solid #4CAF50;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
        }

        .material-type {
            font-size: 1.5em;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .confidence {
            color: #666;
            font-size: 1.1em;
        }

        .ideas-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
        }

        .ideas-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .ideas-grid {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .idea-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-left: 4px solid #4CAF50;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .idea-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .idea-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .idea-title {
            font-size: 1.3em;
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .idea-meta {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .meta-badge {
            background: #e8f5e8;
            padding: 5px 12px;
            border-radius: 15px;
        }

        .idea-description {
            color: #555;
            margin-top: 10px;
            line-height: 1.6;
        }

        .learn-more-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .learn-more-btn:hover {
            background: #45a049;
        }

        /* Guide Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 0;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 25px 30px;
            border-radius: 15px 15px 0 0;
            position: relative;
        }

        .modal-title {
            font-size: 1.8em;
            margin-bottom: 10px;
            padding-right: 100px;
        }

        .modal-subtitle {
            opacity: 0.9;
            font-size: 1em;
        }

        .modal-controls {
            position: absolute;
            top: 20px;
            right: 25px;
            display: flex;
            gap: 15px;
        }

        .audio-btn, .close-btn {
            font-size: 1.8em;
            color: white;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .audio-btn:hover, .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .audio-btn.playing {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .close-btn:hover {
            transform: rotate(90deg) scale(1.1);
        }

        .modal-body {
            padding: 30px;
        }

        .guide-section {
            margin-bottom: 30px;
        }

        .guide-section h3 {
            color: #2e7d32;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .generated-image-section {
            background: #f0f7f0;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
        }

        .generate-image-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
        }

        .generate-image-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .generate-image-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .generated-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .image-loading {
            padding: 40px;
            text-align: center;
        }

        .image-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        .materials-list, .steps-list, .tips-list {
            list-style: none;
            padding: 0;
        }

        .materials-list li {
            padding: 10px;
            background: #f5f5f5;
            margin-bottom: 8px;
            border-radius: 5px;
            padding-left: 30px;
            position: relative;
        }

        .materials-list li:before {
            content: "✓";
            position: absolute;
            left: 10px;
            color: #4CAF50;
            font-weight: bold;
        }

        .steps-list li {
            padding: 15px;
            background: #fff;
            margin-bottom: 15px;
            border-left: 3px solid #4CAF50;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
            padding-left: 50px;
        }

        .step-number {
            position: absolute;
            left: 12px;
            top: 15px;
            background: #4CAF50;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
        }

        .tips-list li {
            padding: 12px 12px 12px 35px;
            background: #fff8e1;
            margin-bottom: 10px;
            border-radius: 5px;
            position: relative;
        }

        .tips-list li:before {
            content: "💡";
            position: absolute;
            left: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-box {
            background: #e8f5e8;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #2e7d32;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            border-left: 5px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .reset-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            font-size: 1em;
        }

        .reset-btn:hover {
            background: #1976D2;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .upload-area {
                padding: 40px 20px;
            }

            .modal-content {
                margin: 20px;
                max-width: calc(100% - 40px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>♻️ AI-Powered DIY Material Reuse</h1>
            <p>Upload an image and discover 5 creative ways to reuse your materials!</p>
        </div>

        <div class="main-content">
            <!-- Upload Section -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">Drag & drop your image here</div>
                    <div style="margin: 20px 0;">or</div>
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        Choose File
                    </button>
                    <input type="file" id="fileInput" class="file-input" accept="image/*">
                </div>
            </div>

            <!-- Loading Section -->
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p>🤖 AI is analyzing your image and generating creative ideas...</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Results Section -->
            <div class="results-section" id="resultsSection">
                <div class="image-preview">
                    <img id="previewImg" class="preview-img" alt="Uploaded image">
                </div>

                <div class="material-result">
                    <div class="material-type" id="materialType"></div>
                    <div class="confidence" id="confidence"></div>
                </div>

                <div class="ideas-section">
                    <h2 class="ideas-title">💡 5 Creative DIY Ideas - Choose One to Learn More!</h2>
                    <div class="ideas-grid" id="ideasGrid"></div>
                </div>

                <button class="reset-btn" onclick="resetApp()">
                    🔄 Try Another Image
                </button>
            </div>
        </div>
    </div>

    <!-- Guide Modal -->
    <div id="guideModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-controls">
                    <button class="audio-btn" id="audioBtn" onclick="toggleAudio()" title="Listen to guide">
                        🔊
                    </button>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <h2 class="modal-title" id="guideTitle"></h2>
                <p class="modal-subtitle" id="guideSubtitle"></p>
            </div>
            <div class="modal-body" id="guideBody">
                <!-- Guide content will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const loader = document.getElementById('loader');
        const resultsSection = document.getElementById('resultsSection');
        const errorMessage = document.getElementById('errorMessage');
        const guideModal = document.getElementById('guideModal');

        let currentMaterialType = '';
        let currentImageData = '';
        let currentGuide = null;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        let isSpeaking = false;

        // File input change handler
        fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop handlers
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect({ target: { files: files } });
            }
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showError('Please select a valid image file.');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showError('Please select an image smaller than 10MB.');
                return;
            }

            processImage(file);
        }

        function processImage(file) {
            uploadSection.style.display = 'none';
            loader.style.display = 'block';
            errorMessage.style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageData = e.target.result;
                document.getElementById('previewImg').src = currentImageData;
                sendImageToAPI(currentImageData);
            };
            reader.readAsDataURL(file);
        }

        async function sendImageToAPI(imageData) {
            try {
                const response = await fetch(`${API_BASE}/process-image`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: imageData })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const result = await response.json();
                
                if (result.success) {
                    currentMaterialType = result.material_type;
                    displayResults(result);
                } else {
                    throw new Error(result.error || 'Unknown error occurred');
                }

            } catch (error) {
                console.error('API Error:', error);
                showError(`Failed to process image: ${error.message}. Make sure the backend server is running on port 5000.`);
                resetToUpload();
            }
        }

        function displayResults(result) {
            loader.style.display = 'none';
            
            document.getElementById('materialType').textContent = 
                `Detected Material: ${result.material_type.toUpperCase()}`;
            document.getElementById('confidence').textContent = 
                `Confidence: ${(result.confidence * 100).toFixed(1)}%`;

            const ideasGrid = document.getElementById('ideasGrid');
            ideasGrid.innerHTML = '';
            
            result.diy_ideas.forEach((idea) => {
                const card = document.createElement('div');
                card.className = 'idea-card';
                card.innerHTML = `
                    <div class="idea-header">
                        <div>
                            <div class="idea-title">${idea.title}</div>
                            <div class="idea-meta">
                                <span class="meta-badge">⏱️ ${idea.time}</span>
                                <span class="meta-badge">📊 ${idea.difficulty}</span>
                            </div>
                        </div>
                    </div>
                    <div class="idea-description">${idea.description}</div>
                    <button class="learn-more-btn" onclick="showGuide(${idea.id})">
                        📖 View Step-by-Step Guide
                    </button>
                `;
                ideasGrid.appendChild(card);
            });

            resultsSection.style.display = 'block';
        }

        async function showGuide(ideaId) {
            try {
                const response = await fetch(`${API_BASE}/get-guide`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        idea_id: ideaId, 
                        material_type: currentMaterialType 
                    })
                });

                if (!response.ok) {
                    throw new Error(`Failed to fetch guide: ${response.status}`);
                }

                const result = await response.json();
                
                if (result.success) {
                    displayGuide(result.guide);
                } else {
                    showError('Failed to load guide. Please try again.');
                }

            } catch (error) {
                console.error('Guide Error:', error);
                showError(`Failed to load guide: ${error.message}`);
            }
        }

        function displayGuide(guide) {
            currentGuide = guide;
            document.getElementById('guideTitle').textContent = guide.title;
            document.getElementById('guideSubtitle').textContent = guide.description;

            const guideBody = document.getElementById('guideBody');
            guideBody.innerHTML = `
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-label">Difficulty</div>
                        <div class="info-value">${guide.difficulty}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-label">Time Required</div>
                        <div class="info-value">${guide.time}</div>
                    </div>
                </div>

                <div class="guide-section">
                    <h3>📦 Materials Needed</h3>
                    <ul class="materials-list">
                        ${guide.materials.map(material => `<li>${material}</li>`).join('')}
                    </ul>
                </div>

                <div class="guide-section">
                    <h3>📝 Step-by-Step Instructions</h3>
                    <ul class="steps-list">
                        ${guide.steps.map((step, index) => `
                            <li>
                                <div class="step-number">${index + 1}</div>
                                ${step}
                            </li>
                        `).join('')}
                    </ul>
                </div>

                <div class="guide-section">
                    <h3>💡 Pro Tips</h3>
                    <ul class="tips-list">
                        ${guide.tips.map(tip => `<li>${tip}</li>`).join('')}
                    </ul>
                </div>
            `;

            guideModal.style.display = 'block';
            resetAudioButton();
        }

        function toggleAudio() {
            if (isSpeaking) {
                stopSpeech();
            } else {
                startSpeech();
            }
        }

        function startSpeech() {
            if (!currentGuide) return;

            // Stop any ongoing speech
            stopSpeech();

            // Build the complete text to speak
            let textToSpeak = `${currentGuide.title}. ${currentGuide.description}. `;
            
            textToSpeak += `This project takes ${currentGuide.time} and has a ${currentGuide.difficulty} difficulty level. `;
            
            textToSpeak += `Materials needed are: ${currentGuide.materials.join(', ')}. `;
            
            textToSpeak += `Now, let's go through the step-by-step instructions. `;
            
            currentGuide.steps.forEach((step, index) => {
                textToSpeak += `Step ${index + 1}: ${step}. `;
            });
            
            textToSpeak += `Here are some pro tips. `;
            currentGuide.tips.forEach((tip, index) => {
                textToSpeak += `Tip ${index + 1}: ${tip}. `;
            });
            
            textToSpeak += `That's all! Happy crafting!`;

            // Create speech utterance
            currentUtterance = new SpeechSynthesisUtterance(textToSpeak);
            
            // Configure voice settings
            currentUtterance.rate = 0.9; // Slightly slower for clarity
            currentUtterance.pitch = 1;
            currentUtterance.volume = 1;

            // Try to use a good quality voice
            const voices = speechSynthesis.getVoices();
            const englishVoice = voices.find(voice => 
                voice.lang.startsWith('en') && 
                (voice.name.includes('Female') || voice.name.includes('Male'))
            );
            if (englishVoice) {
                currentUtterance.voice = englishVoice;
            }

            // Event handlers
            currentUtterance.onstart = () => {
                isSpeaking = true;
                updateAudioButton(true);
            };

            currentUtterance.onend = () => {
                isSpeaking = false;
                updateAudioButton(false);
            };

            currentUtterance.onerror = (event) => {
                console.error('Speech error:', event);
                isSpeaking = false;
                updateAudioButton(false);
                showError('Text-to-speech error. Please try again.');
            };

            // Start speaking
            speechSynthesis.speak(currentUtterance);
        }

        function stopSpeech() {
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }
            isSpeaking = false;
            updateAudioButton(false);
        }

        function updateAudioButton(isPlaying) {
            const audioBtn = document.getElementById('audioBtn');
            if (isPlaying) {
                audioBtn.textContent = '⏸️';
                audioBtn.classList.add('playing');
                audioBtn.title = 'Stop audio';
            } else {
                audioBtn.textContent = '🔊';
                audioBtn.classList.remove('playing');
                audioBtn.title = 'Listen to guide';
            }
        }

        function resetAudioButton() {
            stopSpeech();
            updateAudioButton(false);
        }

        function closeModal() {
            stopSpeech(); // Stop audio when closing modal
            guideModal.style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target === guideModal) {
                closeModal();
            }
        }

        // Close modal with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // Load voices when available (some browsers load them asynchronously)
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                speechSynthesis.getVoices();
            };
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function resetToUpload() {
            loader.style.display = 'none';
            uploadSection.style.display = 'block';
        }

        function resetApp() {
            resultsSection.style.display = 'none';
            uploadSection.style.display = 'block';
            errorMessage.style.display = 'none';
            fileInput.value = '';
            currentMaterialType = '';
            currentImageData = '';
        }

        // Check backend health on page load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (!response.ok) {
                    throw new Error('Backend not responding');
                }
                console.log('✅ Backend connection successful');
            } catch (error) {
                console.warn('⚠️ Backend not connected:', error.message);
                showError('⚠️ Backend server is not running. Please start the Flask server first (python backend/app.py)');
            }
        });
    </script>
</body>
</html>
